name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Первая джоба: запуск тестов
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run Playwright tests with pytest and generate Allure results
        env:
          headless: True   # Принудительный headless-режим для CI
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses 2

      # Сохраняем папку allure-results как артефакт
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results

  # Вторая джоба: публикация отчёта
  publish-report:
    runs-on: ubuntu-latest
    needs: run-tests   # Запускается только после успешного выполнения run-tests
    if: always()       # Но запускается всегда, даже если run-tests упал (для отладки)

    steps:
      - name: Check out repository (for gh-pages history)
        uses: actions/checkout@v4

      # Получаем историю отчётов Allure из ветки gh-pages
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: allure-history  # Важно: путь, который ожидает генератор отчёта

      # Загружаем сохранённые результаты тестов
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # Генерируем полноценный Allure-отчёт с историей
      - name: Generates Allure Report with history
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      # Публикуем отчёт на GitHub Pages
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history